  <!-- Скрипт для восстановления пути после 404 -->
  <script>
    (function() {
      // Проверяем, есть ли сохраненный путь для восстановления
      var savedPath = sessionStorage.getItem('redirectPath');
      if (savedPath) {
        sessionStorage.removeItem('redirectPath');
        // Сохраняем для использования в React
        window.__REDIRECT_PATH__ = savedPath;
      }

      // Очищаем URL от параметров Google Translate
      if (window.location.hash && window.location.hash.includes('googtrans')) {
        var cleanUrl = window.location.pathname + window.location.search;
        window.history.replaceState(null, '', cleanUrl);
      }
    })();
  </script>
