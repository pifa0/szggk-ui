<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/szggk-ui/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="СЗГГК Геокомплекс — Северо-Западная Геолого-Геофизическая Компания. Геологические и геофизические работы по всей России и за рубежом." />
  <title>СЗГГК Геокомплекс — Геологическая компания</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Russo+One&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <!-- Стили для скрытия плашки Google Translate -->
  <style>
    .goog-te-banner-frame,
    .goog-te-banner-frame.skiptranslate,
    iframe.goog-te-banner-frame {
      display: none !important;
      visibility: hidden !important;
      height: 0 !important;
      width: 0 !important;
      top: -9999px !important;
      position: absolute !important;
    }
    body {
      top: 0px !important;
      margin-top: 0px !important;
      position: relative !important;
    }
    .goog-te-gadget {
      display: none !important;
    }
  </style>
</head>
<body>
<div id="root"></div>

<!-- Google Translate Script -->
<script type="text/javascript">
  function googleTranslateElementInit() {
    new google.translate.TranslateElement({
      pageLanguage: 'ru',
      autoDisplay: false,
      includedLanguages: 'en,fr,pt,de,es,zh-CN',
      layout: google.translate.TranslateElement.InlineLayout.SIMPLE
    }, 'google_translate_element');

    // Скрываем плашку после загрузки
    setTimeout(function() {
      var banner = document.querySelector('.goog-te-banner-frame');
      if (banner) {
        banner.style.display = 'none';
      }
      document.body.style.top = '0px';
    }, 100);
  }
</script>
<script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
